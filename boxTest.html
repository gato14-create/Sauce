<!DOCTYPE html>
<html lang="ko" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>포지션 연습</title>
    <style media="screen">
      *{
        padding: 0px;
        margin: 0px;
      }
      .total{
        width: 404px;
        height: 202px;
        display: flex;
        flex-wrap: wrap;
      }
      .box{
        width: 200px;
        height: 100px;
        display: flex;
        flex-wrap: wrap;
      }
      #box1{
        background-color: skyblue;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #box2{
        background-color: hotpink;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #box3{
        background-color: yellow;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #box4{
        background-color: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    
    </style>
  </head>
  <body>
    <div class="total">
      <div class="box" id="box1">
        <b>skyblue</b>
      </div>
      <div class="box" id="box2">
        <b>hotpink</b>
      </div>
      <div class="box" id="box3">
        <b>yellow</b>
      </div>
      <div class="box" id="box4">
        <b>black</b>
      </div>
    </div>
  </body>
</html>
